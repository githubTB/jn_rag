<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RAG 知识库</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --ink:#1a1a2e;--ink-soft:#4a4a6a;--ink-muted:#8888aa;
  --paper:#f8f7f4;--surface:#fff;
  --accent:#5c6bc0;--accent-h:#3f51b5;--accent-bg:rgba(92,107,192,0.07);
  --success:#2e7d5e;--warn:#b45309;--danger:#c0392b;
  --border:rgba(92,107,192,0.14);--shadow:0 2px 16px rgba(26,26,46,0.07);
  --radius:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Noto Serif SC',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(26,26,46,0.05)}
.brand{display:flex;align-items:center;gap:10px;font-family:'Noto Serif SC',serif;font-weight:700;font-size:1.1rem;color:var(--accent);text-decoration:none}
.brand-icon{width:30px;height:30px;background:var(--accent);border-radius:8px;display:grid;place-items:center;color:#fff;font-size:14px;flex-shrink:0}
nav{display:flex;gap:2px}
.nav-btn{padding:6px 14px;border:none;background:none;border-radius:8px;font-size:0.82rem;font-weight:500;color:var(--ink-muted);cursor:pointer;transition:all .15s;font-family:inherit}
.nav-btn:hover,.nav-btn.active{color:var(--accent);background:var(--accent-bg)}
.nav-btn.active{font-weight:600}
#health-pill{display:flex;align-items:center;gap:6px;font-size:0.75rem;color:var(--ink-muted);padding:4px 12px;border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap}
#health-pill:hover{border-color:var(--accent);color:var(--accent)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--ink-muted);flex-shrink:0}
.dot.ok{background:#22c55e;box-shadow:0 0 5px #22c55e80}
.dot.warn{background:#f59e0b}
.dot.err{background:var(--danger)}
.view{display:none;flex:1;max-width:1280px;width:100%;margin:0 auto;padding:24px 20px}
.view.active{display:block}
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}
.card+.card{margin-top:14px}
.ch{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-weight:600;font-size:0.87rem}
.ch .ic{color:var(--accent);font-size:0.95rem}
.cb{padding:18px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:860px){.g2{grid-template-columns:1fr}.g4{grid-template-columns:1fr 1fr}}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
.stat-v{font-size:1.9rem;font-weight:700;color:var(--accent);font-family:'JetBrains Mono',monospace;line-height:1}
.stat-l{font-size:0.77rem;color:var(--ink-muted);margin-top:6px}
.stat-s{font-size:0.7rem;color:var(--ink-muted);margin-top:3px;font-family:'JetBrains Mono',monospace}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border:none;border-radius:8px;font-size:0.83rem;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap}
.btn-p{background:var(--accent);color:#fff}
.btn-p:hover:not(:disabled){background:var(--accent-h);transform:translateY(-1px);box-shadow:0 4px 12px rgba(92,107,192,.28)}
.btn-g{background:transparent;color:var(--ink-soft);border:1px solid var(--border)}
.btn-g:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.btn-d{background:transparent;color:var(--danger);border:1px solid rgba(192,57,43,.22)}
.btn-d:hover:not(:disabled){background:rgba(192,57,43,.05)}
.btn-warn{background:transparent;color:var(--warn);border:1px solid rgba(180,83,9,.22)}
.btn-warn:hover:not(:disabled){background:rgba(180,83,9,.05)}
.btn-sm{padding:5px 10px;font-size:0.77rem}
.btn-fw{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fl{font-size:0.73rem;color:var(--ink-muted);font-weight:500}
.fi{border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:0.82rem;outline:none;transition:border-color .2s;background:var(--paper);color:var(--ink);font-family:inherit;width:100%}
.fi:focus{border-color:var(--accent)}
.dz{border:2px dashed var(--border);border-radius:8px;padding:32px 16px;text-align:center;cursor:pointer;transition:all .2s;background:var(--paper)}
.dz:hover,.dz.over{border-color:var(--accent);background:var(--accent-bg)}
.dz input{display:none}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:0.69rem;font-weight:600;line-height:1.6}
.tg-license{background:#fff7ed;color:#c2410c}
.tg-invoice{background:#f0fdf4;color:#166534}
.tg-table{background:#eff6ff;color:#1e40af}
.tg-nameplate{background:#fdf4ff;color:#7e22ce}
.tg-document{background:#f8fafc;color:#475569;border:1px solid #e2e8f0}
.tg-unknown{background:#f1f5f9;color:#64748b}
.tg-done{background:#f0fdf4;color:#166534}
.tg-failed{background:#fef2f2;color:#991b1b}
.tg-pending{background:#fffbeb;color:#92400e}
.tg-confirmed{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.tg-auto{background:#f1f5f9;color:#64748b;border:1px dashed #cbd5e1}
.company-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);transition:all .18s;cursor:pointer}
.cc:hover,.cc.sel{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 20px rgba(92,107,192,.14)}
.cc.sel{background:var(--accent-bg)}
.cc-name{font-weight:600;font-size:0.93rem;margin-bottom:4px}
.cc-id{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--ink-muted);margin-bottom:10px}
.cc-stats{display:flex;gap:14px}
.cc-stat-v{font-size:1.05rem;font-weight:700;color:var(--accent);font-family:'JetBrains Mono',monospace}
.cc-stat-l{font-size:0.67rem;color:var(--ink-muted)}
.frow{display:grid;grid-template-columns:1fr auto auto auto auto;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;transition:background .12s;border:1px solid transparent}
.frow:hover{background:var(--paper);border-color:var(--border)}
.frow+.frow{margin-top:4px}
.fname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink-soft);font-size:0.82rem}
.frow-actions{display:flex;align-items:center;gap:6px}
.dt-select{border:1px solid var(--border);border-radius:6px;padding:3px 6px;font-size:0.75rem;background:var(--paper);color:var(--ink);outline:none;font-family:inherit;cursor:pointer;transition:border-color .15s}
.dt-select.changed{border-color:var(--warn);background:#fffbeb}
.sbar{display:flex;gap:10px}
.sbar input{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:0.92rem;outline:none;transition:border-color .2s;background:var(--surface);font-family:inherit}
.sbar input:focus{border-color:var(--accent)}
.sopts{display:flex;align-items:center;gap:10px;font-size:0.78rem;color:var(--ink-muted);margin-top:8px;flex-wrap:wrap}
.sopts select{border:1px solid var(--border);border-radius:6px;padding:3px 7px;font-size:0.78rem;background:var(--paper);color:var(--ink);outline:none;font-family:inherit}
.ah{display:flex;align-items:center;gap:8px;padding:11px 18px;border-bottom:1px solid var(--border)}
.mbadge{font-family:'JetBrains Mono',monospace;font-size:0.69rem;padding:2px 7px;background:var(--accent-bg);color:var(--accent);border-radius:4px;border:1px solid rgba(92,107,192,.18)}
#answer-body{padding:18px;font-size:0.9rem;line-height:1.8;white-space:pre-wrap}
.ri{border:1px solid var(--border);border-radius:9px;padding:12px 14px;margin-bottom:9px;background:var(--surface)}
.ri:hover{box-shadow:var(--shadow);border-color:rgba(92,107,192,.28)}
.ri-top{display:flex;align-items:flex-start;gap:9px;margin-bottom:7px}
.ri-num{width:23px;height:23px;border-radius:50%;background:var(--accent-bg);color:var(--accent);font-size:0.74rem;font-weight:700;display:grid;place-items:center;flex-shrink:0}
.ri-meta{font-size:0.75rem;color:var(--ink-muted);line-height:1.6}
.ri-text{font-size:0.8rem;color:var(--ink-soft);line-height:1.7;max-height:88px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.ri-score{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--ink-muted);margin-top:5px}
.slog{background:#1a1a2e;color:#a8d8a8;border-radius:8px;padding:13px;font-family:'JetBrains Mono',monospace;font-size:0.76rem;line-height:1.7;max-height:260px;overflow-y:auto;margin-top:12px;display:none}
.slog.on{display:block}
.prog{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:8px;display:none}
.prog.on{display:block}
.prog-bar{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.modal{display:none;position:fixed;inset:0;background:rgba(26,26,46,.42);z-index:300;place-items:center}
.modal.open{display:grid}
.mbox{background:var(--surface);border-radius:var(--radius);padding:24px;min-width:340px;max-width:520px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.18);position:relative}
.mtitle{font-weight:700;font-size:0.97rem;margin-bottom:16px}
.mclose{position:absolute;top:13px;right:13px;background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--ink-muted)}
#toast{position:fixed;bottom:22px;right:22px;padding:10px 16px;border-radius:10px;font-size:0.83rem;font-weight:500;max-width:340px;box-shadow:0 4px 18px rgba(0,0,0,.14);transform:translateY(70px);opacity:0;transition:all .28s cubic-bezier(.34,1.56,.64,1);z-index:999;pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}
#toast.success{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
#toast.error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
#toast.warning{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
#toast.info{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe}
.empty{text-align:center;padding:44px 20px;color:var(--ink-muted)}
.empty .big{font-size:2.4rem;margin-bottom:10px;opacity:.2}
.dist-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;gap:1px;margin:8px 0}
.dist-leg{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.dist-item{display:flex;align-items:center;gap:4px;font-size:0.71rem;color:var(--ink-muted)}
.dist-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;display:inline-block}
.hrow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:0.82rem}
.hrow:last-child{border:none}
.hkey{color:var(--ink-soft)}
.hval{font-family:'JetBrains Mono',monospace;font-size:0.75rem}
.ok{color:var(--success);font-weight:600}
.fail{color:var(--danger);font-weight:600}

/* 文件夹上传 */
.folder-dz{border:2px dashed var(--accent);border-radius:10px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--accent-bg)}
.folder-dz:hover{background:rgba(92,107,192,0.12)}
.folder-dz input{display:none}
.upload-file-list{max-height:200px;overflow-y:auto;margin-top:10px;border:1px solid var(--border);border-radius:8px;padding:8px}
.upload-file-item{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;font-size:0.77rem;color:var(--ink-soft);border-radius:4px}
.upload-file-item:hover{background:var(--paper)}
.upload-file-path{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:360px;font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--ink-muted)}
.step-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:0.72rem;font-weight:700;flex-shrink:0}
.step-badge.done{background:var(--success)}
.step-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px}
.step-content{flex:1}
</style>
</head>
<body>

<header>
  <a class="brand" href="#" onclick="switchView('overview');return false">
    <div class="brand-icon">⚡</div>RAG 知识库
  </a>
  <nav>
    <button class="nav-btn active" data-view="overview"  onclick="switchView('overview')">概览</button>
    <button class="nav-btn"        data-view="companies" onclick="switchView('companies')">企业管理</button>
    <button class="nav-btn"        data-view="query"     onclick="switchView('query')">智能问答</button>
  </nav>
  <div id="health-pill" onclick="showHealth()">
    <span class="dot" id="sdot"></span>
    <span id="stxt">检查中…</span>
  </div>
</header>

<div id="toast"></div>

<!-- 概览 -->
<div class="view active" id="view-overview">
  <div class="g4" style="margin-bottom:18px">
    <div class="stat"><div class="stat-v" id="sv-companies">-</div><div class="stat-l">企业数量</div></div>
    <div class="stat"><div class="stat-v" id="sv-files">-</div><div class="stat-l">已入库文件</div><div class="stat-s" id="sv-files-s"></div></div>
    <div class="stat"><div class="stat-v" id="sv-confirmed">-</div><div class="stat-l">人工已确认</div></div>
    <div class="stat"><div class="stat-v" id="sv-vectors">-</div><div class="stat-l">向量数量</div><div class="stat-s" id="sv-vstate"></div></div>
  </div>
  <div class="g2">
    <div>
      <div class="card">
        <div class="ch"><span class="ic">📊</span>文件类型分布</div>
        <div class="cb">
          <div class="dist-bar" id="dist-bar"></div>
          <div class="dist-leg" id="dist-leg"></div>
          <div style="font-size:.78rem;color:var(--ink-muted)" id="dist-empty">暂无数据</div>
        </div>
      </div>
      <div class="card">
        <div class="ch"><span class="ic">🔧</span>系统状态</div>
        <div class="cb" id="sys-detail" style="font-size:.81rem;line-height:2.1;color:var(--ink-soft)"></div>
      </div>
    </div>
    <div>
      <div class="card">
        <div class="ch"><span class="ic">🏢</span>企业概况</div>
        <div class="cb" id="ov-companies"><div class="empty"><div class="big">🏢</div>暂无企业</div></div>
      </div>
    </div>
  </div>
</div>

<!-- 企业管理 -->
<div class="view" id="view-companies">
  <div class="g2">

    <!-- 左侧：新建企业 + 文件夹上传 -->
    <div>
      <div class="card">
        <div class="ch"><span class="ic">➕</span>新建企业并上传资料</div>
        <div class="cb">

          <!-- Step 1: 填写企业信息 -->
          <div class="step-row">
            <span class="step-badge" id="step1-badge">1</span>
            <div class="step-content">
              <div style="font-weight:600;font-size:.85rem;margin-bottom:8px">填写企业信息</div>
              <div class="fg">
                <label class="fl">企业 ID（唯一标识，建议英文+数字）</label>
                <input class="fi" id="new-cid" placeholder="例：company_001"/>
              </div>
              <div class="fg" style="margin-bottom:0">
                <label class="fl">企业名称</label>
                <input class="fi" id="new-cname" placeholder="重庆××有限公司"/>
              </div>
            </div>
          </div>

          <div style="height:1px;background:var(--border);margin:12px 0"></div>

          <!-- Step 2: 选择文件夹 -->
          <div class="step-row">
            <span class="step-badge" id="step2-badge">2</span>
            <div class="step-content">
              <div style="font-weight:600;font-size:.85rem;margin-bottom:8px">选择企业资料文件夹</div>
              <div class="folder-dz" id="folder-dz" onclick="document.getElementById('folder-input').click()">
                <input type="file" id="folder-input" webkitdirectory multiple/>
                <div style="font-size:2rem;opacity:.4;margin-bottom:8px">📁</div>
                <div style="font-size:.87rem;color:var(--ink-soft);font-weight:500">点击选择文件夹</div>
                <div style="font-size:.75rem;color:var(--ink-muted);margin-top:4px">支持整个目录，保持子目录结构</div>
              </div>
              <div id="folder-summary" style="display:none;margin-top:10px;padding:10px 12px;background:var(--paper);border-radius:8px;font-size:.82rem">
                <div id="folder-summary-text"></div>
                <div class="upload-file-list" id="folder-file-list"></div>
              </div>
            </div>
          </div>

          <div style="height:1px;background:var(--border);margin:12px 0"></div>

          <!-- Step 3: 上传 -->
          <div class="step-row">
            <span class="step-badge" id="step3-badge">3</span>
            <div class="step-content">
              <div style="font-weight:600;font-size:.85rem;margin-bottom:8px">上传文件到服务器</div>
              <div class="prog" id="upload-prog"><div class="prog-bar" id="upload-bar" style="width:0"></div></div>
              <div style="font-size:.73rem;color:var(--ink-muted);margin:4px 0 8px" id="upload-status"></div>
              <button class="btn btn-p btn-fw" id="upload-btn" onclick="doFolderUpload()">
                📤 上传文件夹
              </button>
            </div>
          </div>

          <div style="height:1px;background:var(--border);margin:12px 0"></div>

          <!-- Step 4: 入库 -->
          <div class="step-row">
            <span class="step-badge" id="step4-badge">4</span>
            <div class="step-content">
              <div style="font-weight:600;font-size:.85rem;margin-bottom:4px">开始入库</div>
              <div style="font-size:.78rem;color:var(--ink-muted);margin-bottom:8px">文件上传完成后，点击开始解析并写入知识库</div>
              <div style="display:flex;gap:8px">
                <button class="btn btn-p" style="flex:1" id="scan-async-btn" onclick="doNewScan(false)" disabled>
                  🚀 异步入库
                </button>
                <button class="btn btn-g" style="flex:1" id="scan-sync-btn" onclick="doNewScan(true)" disabled>
                  ⏳ 同步等待
                </button>
              </div>
              <div class="slog" id="scan-log"></div>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- 右侧：企业列表 -->
    <div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-weight:600;font-size:.95rem">企业列表</span>
        <button class="btn btn-g btn-sm" onclick="loadCompanies()">🔄 刷新</button>
      </div>
      <div class="company-grid" id="company-grid">
        <div class="empty"><div class="big">🏢</div>暂无企业</div>
      </div>

      <!-- 企业详情 -->
      <div class="card" id="company-detail" style="display:none;margin-top:14px">
        <div class="ch">
          <span class="ic">📁</span>
          <span id="detail-name"></span>
          <span id="detail-confirm-badge" style="margin-left:6px;font-size:.72rem;color:var(--ink-muted)"></span>
          <span style="flex:1"></span>
          <button class="btn btn-d btn-sm" id="detail-del-btn">删除企业</button>
          <button class="btn btn-g btn-sm" onclick="closeDetail()" style="margin-left:6px">关闭</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr auto auto auto auto;gap:8px;padding:8px 12px;font-size:.71rem;font-weight:600;color:var(--ink-muted);border-bottom:1px solid var(--border)">
          <span>文件名</span>
          <span style="min-width:100px;text-align:center">文件类型</span>
          <span style="min-width:54px;text-align:center">确认</span>
          <span style="min-width:54px;text-align:center">状态</span>
          <span style="min-width:120px;text-align:center">操作</span>
        </div>
        <div class="cb" id="detail-files" style="padding:8px 12px"></div>

        <!-- 再次入库操作 -->
        <div style="padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center">
          <span style="font-size:.8rem;color:var(--ink-muted);flex:1">重新扫描入库：</span>
          <button class="btn btn-warn btn-sm" id="rescan-async-btn" onclick="doRescan(false)">🚀 异步入库</button>

  clearTimeout(_tt); _tt = setTimeout(() => el.className='', type==='error'?5000:3500);

function renderFileList(files, cid) {
  const el = document.getElementById('detail-files');
  if (!files.length) {
    el.innerHTML = '<div class="empty" style="padding:20px"><div class="big">📁</div>暂无文件</div>';
    return;
  }
  el.innerHTML = files.map(f => {
    const fileId = f.file_id;

      ? '<span class="tag tg-confirmed">✓ 已确认</span>'
      : '<span class="tag tg-auto">自动</span>';

    <div class="frow" id="frow-${fileId}">
      <span class="fname" title="${f.filename}">📄 ${f.filename}</span>
      <select class="dt-select" id="dt-${fileId}" onchange="onDtChange('${fileId}',this)">${dtOptions}</select>
      <span>${confirmBadge}</span>

        <button class="btn btn-g btn-sm" id="save-dt-${fileId}" style="display:none" onclick="saveDtType('${fileId}','${cid}')">💾 保存</button>

function onDtChange(fileId, sel) {
  document.getElementById(`save-dt-${fileId}`).style.display = 'inline-flex';
  sel.classList.add('changed');

async function saveDtType(fileId, cid) {
  const sel = document.getElementById(`dt-${fileId}`);
  const btn = document.getElementById(`save-dt-${fileId}`);
  btn.disabled = true; btn.innerHTML = '<span class="spin">⚙️</span>';
  try {
    const r = await fetch(`/api/files/${fileId}/doc_type`, {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({doc_type: sel.value, confirmed: true}),
    });
    if (!r.ok) throw new Error((await r.json()).detail||'保存失败');
    toast(`已确认：${TYPE_LABEL[sel.value]}`,'success');
    sel.classList.remove('changed');
    btn.style.display = 'none';
    const badge = document.querySelector(`#frow-${fileId} .tg-auto, #frow-${fileId} .tg-confirmed`);
    if (badge) { badge.className='tag tg-confirmed'; badge.textContent='✓ 已确认'; }
    await loadCompaniesData(); loadCompanies();
  } catch(e) { toast(e.message,'error'); }
  finally { btn.disabled=false; btn.innerHTML='💾 保存'; }
}

async function reprocessFile(fileId, filename) {
  if (!confirm(`重新处理：${filename}\n\n将删除旧向量并重新解析，确认继续？`)) return;
  const btn = document.getElementById(`repr-${fileId}`);
  btn.innerHTML = '<span class="spin">🔄</span>';  btn.disabled = true;
  try {
    const r = await fetch(`/api/files/${fileId}/reprocess`, {method:'POST'});
    if (!r.ok) throw new Error((await r.json()).detail||'失败');
    toast(`${filename} 已提交重新处理`,'success');
    const row = document.getElementById(`frow-${fileId}`);
    if (row) {
      const tag = row.querySelector('[class*="tg-"]');
      if (tag) { tag.className='tag tg-pending'; tag.textContent='处理中'; }
    }
  } catch(e) { toast(e.message,'error'); }
  finally { btn.innerHTML='🔄 重处理'; btn.disabled=false; }
}

// ── 文件夹上传 ────────────────────────────────────────────────────────────
async function doFolderUpload() {
  const cid   = document.getElementById('new-cid').value.trim();
  const cname = document.getElementById('new-cname').value.trim();

  if (!cid)   { toast('请填写企业 ID','warning'); return; }
  if (!cname) { toast('请填写企业名称','warning'); return; }
  if (!folderFiles.length) { toast('请先选择文件夹','warning'); return; }

  const btn  = document.getElementById('upload-btn');
  const prog = document.getElementById('upload-prog');
  const bar  = document.getElementById('upload-bar');
  const stat = document.getElementById('upload-status');

  btn.disabled = true;
  btn.innerHTML = '<span class="spin">📤</span> 上传中…';
  prog.classList.add('on');
  stat.textContent = '准备上传…';

  // 分批上传，每批 20 个文件，避免请求体过大
  const BATCH = 20;
  let savedTotal = 0, skippedTotal = 0;

  for (let i = 0; i < folderFiles.length; i += BATCH) {
    const batch = folderFiles.slice(i, Math.min(i + BATCH, folderFiles.length));
    const pct = Math.round((i / folderFiles.length) * 100);
    bar.style.width = pct + '%';
    stat.textContent = `上传中 ${i+1}~${Math.min(i+BATCH, folderFiles.length)} / ${folderFiles.length}`;

    const fd = new FormData();
    fd.append('company_id', cid);
    fd.append('company_name', cname);
    batch.forEach(f => {
      fd.append('files', f);
      fd.append('relative_paths', f.webkitRelativePath);
    });

    try {
      const r = await fetch('/api/upload/folder', {method:'POST', body: fd});
      if (!r.ok) { const e=await r.json(); throw new Error(e.detail||'上传失败'); }
      const d = await r.json();
      savedTotal   += d.saved;
      skippedTotal += d.skipped;
    } catch(e) {
      toast('上传失败: ' + e.message, 'error');
      btn.disabled = false; btn.innerHTML = '📤 上传文件夹';
      return;
    }
  }

  bar.style.width = '100%';
  stat.textContent = `上传完成：${savedTotal} 个文件成功，${skippedTotal} 个跳过`;
  toast(`文件上传完成，共 ${savedTotal} 个`, 'success');

  // 标记步骤完成，解锁入库按钮
  document.getElementById('step3-badge').className = 'step-badge done';
  document.getElementById('scan-async-btn').disabled = false;
  document.getElementById('scan-sync-btn').disabled  = false;
  uploadedCompanyId = cid;

  btn.disabled = false;
  btn.innerHTML = '✓ 上传完成';

  await loadCompaniesData();
  loadCompanies();
}

// ── 现有企业重新扫描 ──────────────────────────────────────────────────────
async function doRescan(sync) {
  if (!selectedCid) { toast('请先选择企业','warning'); return; }
  await _doScan(selectedCid, sync, 'rescan-log',
    document.getElementById('rescan-async-btn'),
    document.getElementById('rescan-sync-btn'));
}

async function _doScan(cid, sync, logId, btnAsync, btnSync) {
  const log = document.getElementById(logId);
  btnAsync.disabled = btnSync.disabled = true;
  log.classList.add('on');
  const ts = () => new Date().toLocaleTimeString();
  log.textContent = `[${ts()}] 开始扫描 ${cid}...\n`;

  try {
    const r = await fetch(`/api/ingest/scan/${encodeURIComponent(cid)}?sync=${sync}`, {method:'POST'});
    if (!r.ok) { const e=await r.json(); throw new Error(e.detail||'扫描失败'); }
    const d = await r.json();

    if (sync) {
      (d.results||[]).forEach(x => {
        log.textContent += `[${x.status==='done'?'✓':'✗'}] ${x.file}  ${x.doc_type}  chunks:${x.chunks??'-'}\n`;
      });
      log.textContent += `\n[${ts()}] 完成，共 ${d.total} 个文件\n`;
      toast(`入库完成：${d.total} 个文件`,'success');
      loadOverview();
    } else {
      (d.files||[]).forEach(f => { log.textContent += `[排队] ${f.file}  ${f.doc_type}\n`; });
      log.textContent += `\n[${ts()}] 已提交 ${d.total} 个文件到后台\n`;
      toast(`已提交 ${d.total} 个文件后台处理`,'info');
    }
    log.scrollTop = log.scrollHeight;
  } catch(e) {
    log.textContent += `\n[错误] ${e.message}\n`;
    toast(e.message,'error');
  } finally {
    btnAsync.disabled = btnSync.disabled = false;
  }
}

  const q = document.getElementById('qi').value.trim();
  if (!q) { toast('请输入问题','warning'); return; }
  const topk = document.getElementById('q-topk').value;
  const cid  = document.getElementById('q-company').value;

  document.getElementById('results').innerHTML='<div class="empty"><div class="spin" style="font-size:1.4rem">⚙️</div></div>';
  document.getElementById('answer-card').style.display='none';
  try {
    let url = `/api/query?q=${encodeURIComponent(q)}&top_k=${topk}`;
    if (cid) url+=`&company_id=${encodeURIComponent(cid)}`;
    if (preferSource) url+=`&prefer_source=${encodeURIComponent(preferSource)}`;
    if (dt)  url+=`&doc_type=${encodeURIComponent(dt)}`;
    const r = await fetch(url);
    if (!r.ok) { const e=await r.json(); throw new Error(e.detail||`HTTP ${r.status}`); }
    const data = await r.json();

    document.getElementById('answer-card').style.display='block';
    document.getElementById('q-model').textContent = healthData.llm_model||'Qwen';
    document.getElementById('q-reranker').textContent = data.reranker ? '✓ Reranker 精排' : '';
    document.getElementById('answer-body').innerHTML = (data.answer||'')
      .replace(/\[(\d+)\]/g,'<span style="font-family:JetBrains Mono,monospace;font-size:.72rem;color:var(--accent);background:var(--accent-bg);padding:1px 4px;border-radius:3px">[$1]</span>');

    const hits = data.chunks||[];
    if (!hits.length) {
      document.getElementById('results').innerHTML='<div class="empty"><div class="big">🔎</div>未找到相关内容</div>';
    } else {
      document.getElementById('results').innerHTML = hits.map((h,i) => `
        <div class="ri">
          <div class="ri-top">
            <div class="ri-num">${i+1}</div>
            <div class="ri-meta">
              ${h.company_id?`<span class="tag tg-document" style="margin-right:5px">🏢 ${h.company_id}</span>`:''}
              <span class="tag tg-${h.doc_type||'unknown'}">${TYPE_LABEL[h.doc_type]||h.doc_type||'未知'}</span>
              <span style="margin-left:6px;font-weight:500">${(h.source||'').split('/').pop()}</span>
            </div>
          </div>
          <div class="ri-text">${esc(h.content||'')}</div>
          <div class="ri-score">
            向量 ${((h.score||0)*100).toFixed(1)}%
            ${h.rerank_score!=null?' · Reranker '+(h.rerank_score*100).toFixed(1)+'%':''}
          </div>
        </div>`).join('');
    }
  } catch(e) {
    document.getElementById('results').innerHTML=`<div class="empty" style="color:var(--danger)">搜索出错：${e.message}</div>`;
  } finally { btn.disabled=false; btn.innerHTML='🔍 搜索'; }
}

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
document.getElementById('qbtn').addEventListener('click', doSearch);
document.getElementById('qi').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });

function refreshSelects() {
  const el = document.getElementById('q-company');
  const first = el.options[0].outerHTML;
  el.innerHTML = first + companies.map(c=>`<option value="${c.company_id}">${c.name}</option>`).join('');
  refreshPreferSourceOptions();
}

async function refreshPreferSourceOptions() {
  const cid = document.getElementById('q-company').value;
  const sel = document.getElementById('q-prefer-source');
  sel.innerHTML = '<option value="">未指定</option>';

  if (!cid) {
    sel.disabled = true;
    return;
  }

  sel.disabled = false;
  if (!companyFilesCache[cid]) {
    try {
      const d = await fetch(`/api/companies/${encodeURIComponent(cid)}`).then(r=>r.json());
      companyFilesCache[cid] = (d.files || []).map(f => f.filename).filter(Boolean);
    } catch {
      companyFilesCache[cid] = [];
    }
  }

  const files = [...new Set(companyFilesCache[cid])].sort((a,b)=>a.localeCompare(b,'zh-CN'));
  sel.innerHTML += files.map(name => `<option value="${name}">${name}</option>`).join('');
}

document.getElementById('q-company').addEventListener('change', refreshPreferSourceOptions);

// ── 初始化 ────────────────────────────────────────────────────────────────
(async () => {
  await loadCompaniesData();
  loadOverview();
  refreshSelects();
})();
</script>
